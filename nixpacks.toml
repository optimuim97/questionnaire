[phases.setup]
nixPkgs = [
  "php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.bcmath",
  "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.tokenizer",
  "php83Extensions.fileinfo", "php83Extensions.intl", "php83Extensions.session",
  "nodejs_22", "npm-check-updates"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction -q",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan key:generate --force",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "bash start.sh"
